<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/png" href="DOWNLOADER.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TikTok Downloader - Baixe vídeos sem marca d'água</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS (mantidos iguais aos seus) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }
        .container { max-width: 880px; width: 100%; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border-radius: 2rem; padding: 2rem; box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, #fff, #ffd6e0); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.5px; }
        .header p { color: #e0e0e0; margin-top: 8px; font-weight: 400; }
        .card { background: rgba(255, 255, 255, 0.95); border-radius: 1.5rem; padding: 1.8rem; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #1e1e2f; font-size: 0.9rem; }
        .input-group label i { margin-right: 8px; color: #ff3b6f; }
        .input-wrapper { display: flex; align-items: center; background: #f1f5f9; border-radius: 60px; padding: 5px 15px; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .input-wrapper:focus-within { border-color: #ff3b6f; box-shadow: 0 0 0 3px rgba(255, 59, 111, 0.2); background: white; }
        .input-wrapper i { color: #94a3b8; font-size: 1.1rem; }
        .input-wrapper input { flex: 1; border: none; background: transparent; padding: 14px 12px; font-size: 1rem; font-family: 'Poppins', sans-serif; outline: none; }
        .btn-download { background: linear-gradient(95deg, #ff3b6f, #fd1d1d); border: none; width: 100%; padding: 14px; border-radius: 60px; font-size: 1.1rem; font-weight: 700; color: white; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: all 0.2s; box-shadow: 0 8px 18px rgba(253, 29, 29, 0.3); }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 12px 22px rgba(253, 29, 29, 0.4); }
        .btn-download:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
        .btn-api-float { position: fixed; bottom: 24px; right: 24px; background: #0f172a; border: none; padding: 14px 24px; border-radius: 60px; font-size: 0.9rem; font-weight: 600; color: white; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.2s; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3); z-index: 1000; backdrop-filter: blur(4px); background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-api-float:hover { background: #ff3b6f; transform: translateY(-3px); box-shadow: 0 12px 24px rgba(255, 59, 111, 0.4); }
        .loading { display: flex; justify-content: center; align-items: center; gap: 12px; color: #1e1e2f; padding: 20px; font-weight: 500; background: rgba(255,255,255,0.9); border-radius: 60px; margin-top: 1rem; }
        .spinner { width: 28px; height: 28px; border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid #ff3b6f; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-card { background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.15); margin-top: 1rem; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .video-preview { display: flex; flex-wrap: wrap; gap: 20px; padding: 1.5rem; border-bottom: 1px solid #edf2f7; }
        .thumbnail { flex-shrink: 0; width: 140px; height: 200px; border-radius: 18px; overflow: hidden; background: #f1f5f9; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .info { flex: 1; }
        .info h3 { font-size: 1.3rem; font-weight: 700; color: #0f172a; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; word-break: break-word; }
        .info h3 i { color: #ff3b6f; }
        .info p { color: #475569; font-size: 0.85rem; margin-bottom: 16px; }
        .btn-save { background: #0f172a; border: none; padding: 12px 28px; border-radius: 40px; color: white; font-weight: 600; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.2s; }
        .btn-save:hover { background: #ff3b6f; transform: scale(1.02); }
        .error-message { background: #fee2e2; color: #b91c1c; padding: 14px; border-radius: 50px; font-size: 0.85rem; font-weight: 500; margin: 1rem 0 0; text-align: center; }
        footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: #aaa; }
        @media (max-width: 640px) { .container { padding: 1rem; } .card { padding: 1.2rem; } .video-preview { flex-direction: column; align-items: center; text-align: center; } .info h3 { justify-content: center; } .thumbnail { width: 120px; height: 170px; } .btn-api-float { padding: 10px 18px; font-size: 0.8rem; bottom: 16px; right: 16px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fab fa-tiktok"></i> TikTok Downloader</h1>
        <p>Baixe vídeos do TikTok sem marca d'água · Rápido e grátis</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label><i class="fab fa-tiktok"></i> URL do vídeo do TikTok</label>
            <div class="input-wrapper">
                <i class="fas fa-link"></i>
                <input type="text" id="videoUrl" placeholder="https://www.tiktok.com/@usuario/video/123456789" value="https://vm.tiktok.com/ZIJWNwKxu">
            </div>
        </div>

        <button class="btn-download" id="downloadBtn"><i class="fas fa-cloud-download-alt"></i> Baixar vídeo agora</button>
    </div>

    <div id="resultArea"></div>

    <footer>
        <i class="fas fa-shield-alt"></i> O vídeo é baixado diretamente da CDN do TikTok. Respeite os direitos autorais.
    </footer>
</div>

<!-- Botão flutuante -->
<button class="btn-api-float" id="apiDocsBtn">
    <i class="fas fa-book-open"></i> Documentação da API
</button>

<script>
    // ============================================================
    // CONFIGURAÇÃO DA API
    // ============================================================
    const API_BASE_URL = "https://api-tiktok-pc0800.onrender.com";
    const API_KEY = "7x9K!mQ2@zLp#wR4";   // Sua chave
    const API_DOCS_URL = API_BASE_URL + "/docs";

    const videoUrlInput = document.getElementById('videoUrl');
    const downloadBtn = document.getElementById('downloadBtn');
    const resultArea = document.getElementById('resultArea');
    const apiDocsBtn = document.getElementById('apiDocsBtn');

    if (apiDocsBtn) {
        apiDocsBtn.addEventListener('click', () => window.open(API_DOCS_URL, '_blank'));
    }

    // Função para escapar caracteres HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showLoading(show, message = "Buscando informações do vídeo...") {
        if (show) {
            resultArea.innerHTML = `<div class="loading"><div class="spinner"></div><span>${message}</span></div>`;
        } else {
            if (resultArea.firstChild && resultArea.firstChild.classList && resultArea.firstChild.classList.contains('loading')) {
                resultArea.innerHTML = '';
            }
        }
    }

    function showError(message) {
        resultArea.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
    }

    // Função para mostrar a prévia com dois botões (vídeo e áudio)
    function showPreview(thumbnailUrl, videoTitle, videoDownloadHandler, audioDownloadHandler) {
        resultArea.innerHTML = `
            <div class="result-card" id="resultCard">
                <div class="video-preview">
                    <div class="thumbnail">
                        <img src="${thumbnailUrl}" alt="thumbnail" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/400x600?text=Sem+Preview'">
                    </div>
                    <div class="info">
                        <h3><i class="fab fa-tiktok"></i> ${escapeHtml(videoTitle)}</h3>
                        <p><i class="fas fa-download"></i> Escolha o formato:</p>
                        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                            <button class="btn-save" id="finalDownloadBtnVideo"><i class="fas fa-video"></i> Baixar vídeo (MP4)</button>
                            <button class="btn-save" id="finalDownloadBtnAudio"><i class="fas fa-music"></i> Baixar áudio (MP3)</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        const videoBtn = document.getElementById('finalDownloadBtnVideo');
        const audioBtn = document.getElementById('finalDownloadBtnAudio');
        if (videoBtn && videoDownloadHandler) videoBtn.addEventListener('click', videoDownloadHandler);
        if (audioBtn && audioDownloadHandler) audioBtn.addEventListener('click', audioDownloadHandler);
        document.getElementById('resultCard')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function sanitizeFilename(name) {
        if (!name) return "tiktok_video";
        let clean = name.replace(/<[^>]*>/g, '');
        clean = clean.replace(/[\\/*?:"<>|]/g, '');
        clean = clean.replace(/[^\w\s\u00C0-\u024F\u1E00-\u1EFF\-\.]/g, '');
        clean = clean.trim().replace(/\s+/g, ' ');
        if (clean.length > 80) clean = clean.substring(0, 80);
        return clean || "tiktok_video";
    }

    async function iniciarProcessamento() {
        let videoUrl = videoUrlInput.value.trim();
        
        // Limpeza da URL: remove parâmetros após '?' e adiciona https://
        if (videoUrl.includes('?')) {
            videoUrl = videoUrl.split('?')[0];
        }
        if (!videoUrl.startsWith('http')) {
            videoUrl = 'https://' + videoUrl;
        }

        if (!videoUrl) {
            showError('Por favor, insira a URL do vídeo do TikTok.');
            return;
        }

        const tiktokRegex = /^(https?:\/\/)?(www\.|vm\.)?tiktok\.com\/(@[\w.]+|t\/[\w]+|embed|v\/\d+)/i;
        if (!tiktokRegex.test(videoUrl) && !videoUrl.includes('tiktok.com')) {
            showError('URL inválida. Cole um link válido do TikTok.');
            return;
        }

        showLoading(true);
        downloadBtn.disabled = true;
        downloadBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processando...';

        try {
            const infoEndpoint = `${API_BASE_URL}/info?url=${encodeURIComponent(videoUrl)}`;
            const infoResponse = await fetch(infoEndpoint, {
                method: 'GET',
                headers: { 'X-API-Key': API_KEY }
            });
            if (!infoResponse.ok) {
                let errorMsg = `Erro ${infoResponse.status}`;
                if (infoResponse.status === 401) errorMsg = 'Chave de API inválida.';
                if (infoResponse.status === 404) errorMsg = 'Vídeo não encontrado. Verifique a URL.';
                throw new Error(errorMsg);
            }

            const infoData = await infoResponse.json();
            const videoTitle = infoData.title;
            const thumbnailUrl = infoData.thumbnail || 'https://placehold.co/400x600?text=Sem+Preview';

            // ========== HANDLER PARA VÍDEO (MP4) ==========
            const videoDownloadHandler = async () => {
                const videoBtn = document.getElementById('finalDownloadBtnVideo');
                if (videoBtn) {
                    videoBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Baixando vídeo...';
                    videoBtn.disabled = true;
                }
                try {
                    const downloadEndpoint = `${API_BASE_URL}/download/video`;
                    const downloadResponse = await fetch(downloadEndpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-API-Key': API_KEY
                        },
                        body: JSON.stringify({ url: videoUrl })
                    });
                    if (!downloadResponse.ok) throw new Error(`Erro ${downloadResponse.status}`);
                    const blob = await downloadResponse.blob();
                    const filename = sanitizeFilename(videoTitle) + ".mp4";
                    const blobUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(blobUrl);
                } catch (err) {
                    showError(`Erro ao baixar vídeo: ${err.message}`);
                } finally {
                    if (videoBtn) {
                        videoBtn.innerHTML = '<i class="fas fa-video"></i> Baixar vídeo (MP4)';
                        videoBtn.disabled = false;
                    }
                }
            };

            // ========== HANDLER PARA ÁUDIO (MP3) ==========
            const audioDownloadHandler = async () => {
                const audioBtn = document.getElementById('finalDownloadBtnAudio');
                if (audioBtn) {
                    audioBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processando áudio...';
                    audioBtn.disabled = true;
                }
                try {
                    const downloadEndpoint = `${API_BASE_URL}/download/audio`;
                    const downloadResponse = await fetch(downloadEndpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-API-Key': API_KEY
                        },
                        body: JSON.stringify({ url: videoUrl })
                    });
                    if (!downloadResponse.ok) throw new Error(`Erro ${downloadResponse.status}`);
                    const blob = await downloadResponse.blob();
                    const filename = sanitizeFilename(videoTitle) + ".mp3";
                    const blobUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(blobUrl);
                } catch (err) {
                    showError(`Erro ao baixar áudio: ${err.message}`);
                } finally {
                    if (audioBtn) {
                        audioBtn.innerHTML = '<i class="fas fa-music"></i> Baixar áudio (MP3)';
                        audioBtn.disabled = false;
                    }
                }
            };

            // Exibe a prévia com os dois botões
            showPreview(thumbnailUrl, videoTitle, videoDownloadHandler, audioDownloadHandler);

        } catch (infoError) {
            console.error(infoError);
            let userMsg = infoError.message || 'Falha ao obter informações do vídeo.';
            if (userMsg.includes('Failed to fetch') || userMsg.includes('NetworkError')) {
                userMsg = 'Erro de rede. Verifique sua conexão com a internet.';
            }
            showError(userMsg);
        } finally {
            showLoading(false);
            downloadBtn.disabled = false;
            downloadBtn.innerHTML = '<i class="fas fa-cloud-download-alt"></i> Baixar vídeo agora';
        }
    }

    downloadBtn.addEventListener('click', iniciarProcessamento);
    videoUrlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') iniciarProcessamento(); });
    videoUrlInput.addEventListener('focus', () => { if (resultArea.innerHTML.includes('error-message')) resultArea.innerHTML = ''; });
</script>
</body>
</html>

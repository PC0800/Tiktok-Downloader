<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/png" href="DOWNLOADER.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TikTok Downloader - Baixe vídeos sem marca d'água</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            transition: background 0.3s ease, color 0.2s ease;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* Container principal */
        .container {
            max-width: 800px;
            width: 100%;
            border-radius: 32px;
            padding: 20px;
            transition: background 0.3s, box-shadow 0.3s;
        }

        /* Cabeçalho */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header p {
            font-size: 0.85rem;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* Card principal */
        .card {
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            transition: background 0.3s, box-shadow 0.3s;
        }

        /* Input groups */
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .input-group label i {
            margin-right: 6px;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            border-radius: 60px;
            padding: 5px 16px;
            transition: all 0.2s;
        }
        .input-wrapper input,
        .input-wrapper select {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 8px;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            width: 100%;
        }

        /* Linha de qualidades (mobile empilha) */
        .quality-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .quality-item {
            flex: 1;
            min-width: 140px;
        }

        /* Botão principal */
        .btn-download {
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-download:active {
            transform: scale(0.97);
        }
        .btn-download:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        /* Botão flutuante de temas */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 1001;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: white;
        }
        .theme-panel {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            z-index: 1000;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            max-width: calc(100% - 40px);
        }
        .theme-panel.hidden {
            display: none;
        }
        .theme-option {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            transition: transform 0.1s;
        }
        .theme-option:active {
            transform: scale(0.9);
        }
        .theme-option.selected {
            border: 3px solid gold;
            transform: scale(1.05);
        }

        /* Botão documentação (já existente) */
        .btn-api-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            z-index: 1000;
        }
        .btn-api-float:active {
            transform: scale(0.96);
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-radius: 60px;
            padding: 16px;
            margin-top: 16px;
            font-weight: 500;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid #ff3b6f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Resultado (prévia) */
        .result-card {
            border-radius: 24px;
            overflow: hidden;
            margin-top: 20px;
        }
        .video-preview {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            gap: 16px;
        }
        .thumbnail {
            width: 130px;
            height: 180px;
            border-radius: 16px;
            overflow: hidden;
            background: #f1f5f9;
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .info {
            width: 100%;
        }
        .info h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .info p {
            font-size: 0.8rem;
            margin-bottom: 16px;
        }
        .btn-save {
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            justify-content: center;
            margin-bottom: 10px;
        }
        .btn-save:active {
            transform: scale(0.97);
        }
        .error-message {
            padding: 12px;
            border-radius: 60px;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 16px;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            opacity: 0.7;
        }

        /* Desktop */
        @media (min-width: 640px) {
            .video-preview {
                flex-direction: row;
                text-align: left;
                align-items: flex-start;
            }
            .info h3 {
                justify-content: flex-start;
            }
            .btn-save {
                width: auto;
                margin-bottom: 0;
                margin-right: 12px;
            }
        }

        /* Temas predefinidos (as variáveis serão aplicadas via JS) */
        /* As cores serão aplicadas dinamicamente, mas definimos transições suaves */
    </style>
</head>

</div>

    function applyTheme(themeName) {
        const theme = themes[themeName];
        if (!theme) return;
        // Aplicar no body
        document.body.style.backgroundColor = theme.bodyBg;
        document.body.style.color = theme.textPrimary;
        // Container
        appContainer.style.background = theme.containerBg;
        appContainer.style.backdropFilter = "blur(12px)";
        appContainer.style.border = "1px solid rgba(255,255,255,0.2)";
        // Card
        mainCard.style.backgroundColor = theme.cardBg;
        mainCard.style.color = theme.textPrimary;
        mainCard.style.boxShadow = "0 15px 35px rgba(0,0,0,0.2)";
        // Inputs
        const wrappers = document.querySelectorAll('.input-wrapper');
        wrappers.forEach(w => {
            w.style.backgroundColor = theme.inputBg;
            w.style.borderColor = theme.inputBorder;
            w.style.color = theme.inputText;
        });
        const selects = document.querySelectorAll('select');
        selects.forEach(s => {
            s.style.backgroundColor = theme.inputBg;
            s.style.color = theme.inputText;
        });
        const textInputs = document.querySelectorAll('input');
        textInputs.forEach(i => {
            i.style.color = theme.inputText;
        });
        // Botão principal
        const btn = document.querySelector('.btn-download');
        btn.style.background = theme.buttonBg;
        btn.style.color = theme.buttonText;
        // Botões flutuantes
        const apiBtn = document.querySelector('.btn-api-float');
        apiBtn.style.backgroundColor = "rgba(0,0,0,0.7)";
        apiBtn.style.color = "white";
        const themeBtn = document.querySelector('.theme-toggle');
        themeBtn.style.backgroundColor = "rgba(0,0,0,0.7)";
        themeBtn.style.color = "white";
        // Result area dinâmica será aplicada nos elementos criados, mas as classes já usarão as cores definidas via CSS?
        // Vamos também salvar variáveis CSS personalizadas para elementos dinâmicos
        document.documentElement.style.setProperty('--result-bg', theme.resultBg);
        document.documentElement.style.setProperty('--result-text', theme.resultText);
        document.documentElement.style.setProperty('--error-bg', theme.errorBg);
        document.documentElement.style.setProperty('--error-text', theme.errorText);
        document.documentElement.style.setProperty('--loading-bg', theme.loadingBg);
        document.documentElement.style.setProperty('--loading-text', theme.loadingText);
        // Guardar no localStorage
        localStorage.setItem('selectedTheme', themeName);
        // Marcar a opção selecionada no painel
        document.querySelectorAll('.theme-option').forEach(opt => {
            if (opt.getAttribute('data-theme') === themeName) {
                opt.classList.add('selected');
            } else {
                opt.classList.remove('selected');
            }
        });
    }

    function loadSavedTheme() {
        const saved = localStorage.getItem('selectedTheme');
        if (saved && themes[saved]) {
            applyTheme(saved);
        } else {
            applyTheme('dark'); // tema padrão
        }
    }

    // Painel de temas toggle
    themeToggleBtn.addEventListener('click', () => {
        themePanel.classList.toggle('hidden');
    });
    document.querySelectorAll('.theme-option').forEach(opt => {
        opt.addEventListener('click', (e) => {
            const themeName = opt.getAttribute('data-theme');
            applyTheme(themeName);
            themePanel.classList.add('hidden');
        });
    });

    // ========== FUNCIONALIDADES EXISTENTES ==========
    if (apiDocsBtn) {
        apiDocsBtn.addEventListener('click', () => window.open(API_DOCS_URL, '_blank'));
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showLoading(show, message = "Buscando informações...") {
        if (show) {
            resultArea.innerHTML = `<div class="loading" style="background: var(--loading-bg, #fff); color: var(--loading-text, #000);"><div class="spinner"></div><span>${message}</span></div>`;
        } else {
            if (resultArea.firstChild && resultArea.firstChild.classList && resultArea.firstChild.classList.contains('loading')) {
                resultArea.innerHTML = '';
            }
        }
    }

    function showError(message) {
        resultArea.innerHTML = `<div class="error-message" style="background: var(--error-bg, #fee2e2); color: var(--error-text, #b91c1c);"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
    }

    function showPreview(thumbnailUrl, videoTitle, videoDownloadHandler, audioDownloadHandler) {
        resultArea.innerHTML = `
            <div class="result-card" id="resultCard" style="background: var(--result-bg, white); color: var(--result-text, black);">
                <div class="video-preview">
                    <div class="thumbnail">
                        <img src="${thumbnailUrl}" alt="thumbnail" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/400x600?text=Sem+Preview'">
                    </div>
                    <div class="info">
                        <h3><i class="fab fa-tiktok"></i> ${escapeHtml(videoTitle)}</h3>
                        <p><i class="fas fa-download"></i> Escolha o formato:</p>
                        <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
                            <button class="btn-save" id="finalDownloadBtnVideo" style="background: #0f172a; color: white;"><i class="fas fa-video"></i> Vídeo (MP4)</button>
                            <button class="btn-save" id="finalDownloadBtnAudio" style="background: #0f172a; color: white;"><i class="fas fa-music"></i> Áudio (MP3)</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        const videoBtn = document.getElementById('finalDownloadBtnVideo');
        const audioBtn = document.getElementById('finalDownloadBtnAudio');
        if (videoBtn && videoDownloadHandler) videoBtn.addEventListener('click', videoDownloadHandler);
        if (audioBtn && audioDownloadHandler) audioBtn.addEventListener('click', audioDownloadHandler);
        document.getElementById('resultCard')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function sanitizeFilename(name) {
        if (!name) return "tiktok_video";
        let clean = name.replace(/<[^>]*>/g, '');
        clean = clean.replace(/[\\/*?:"<>|]/g, '');
        clean = clean.replace(/[^\w\s\u00C0-\u024F\u1E00-\u1EFF\-\.]/g, '');
        clean = clean.trim().replace(/\s+/g, ' ');
        if (clean.length > 80) clean = clean.substring(0, 80);
        return clean || "tiktok_video";
    }

    async function iniciarProcessamento() {
        let videoUrl = videoUrlInput.value.trim();
        if (videoUrl.includes('?')) videoUrl = videoUrl.split('?')[0];
        if (!videoUrl.startsWith('http')) videoUrl = 'https://' + videoUrl;

        if (!videoUrl) {
            showError('Por favor, insira a URL do vídeo do TikTok.');
            return;
        }

        const tiktokRegex = /^(https?:\/\/)?(www\.|vm\.)?tiktok\.com\/(@[\w.]+|t\/[\w]+|embed|v\/\d+)/i;
        if (!tiktokRegex.test(videoUrl)) {
            showError('URL inválida. Cole um link válido do TikTok.');
            return;
        }

        const selectedVideoQuality = videoQualitySelect.value;
        const selectedAudioQuality = audioQualitySelect.value;

        showLoading(true);
        downloadBtn.disabled = true;
        downloadBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processando...';

        try {
            const infoEndpoint = `${API_BASE_URL}/info?url=${encodeURIComponent(videoUrl)}`;
            const infoResponse = await fetch(infoEndpoint, {
                method: 'GET',
                headers: { 'X-API-Key': API_KEY }
            });
            if (!infoResponse.ok) throw new Error(`Erro ${infoResponse.status}`);
            const infoData = await infoResponse.json();
            const videoTitle = infoData.title;
            const thumbnailUrl = infoData.thumbnail || 'https://placehold.co/400x600?text=Sem+Preview';

            const videoDownloadHandler = async () => {
                const btn = document.getElementById('finalDownloadBtnVideo');
                if (btn) { btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Baixando...'; btn.disabled = true; }
                try {
                    const response = await fetch(`${API_BASE_URL}/download/video`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                        body: JSON.stringify({ url: videoUrl, video_quality: selectedVideoQuality })
                    });
                    if (!response.ok) throw new Error(`Erro ${response.status}`);
                    const blob = await response.blob();
                    const filename = sanitizeFilename(videoTitle) + ".mp4";
                    const blobUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(blobUrl);
                } catch (err) {
                    showError(`Erro ao baixar vídeo: ${err.message}`);
                } finally {
                    if (btn) { btn.innerHTML = '<i class="fas fa-video"></i> Vídeo (MP4)'; btn.disabled = false; }
                }
            };

            const audioDownloadHandler = async () => {
                const btn = document.getElementById('finalDownloadBtnAudio');
                if (btn) { btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processando...'; btn.disabled = true; }
                try {
                    const response = await fetch(`${API_BASE_URL}/download/audio`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                        body: JSON.stringify({ url: videoUrl, audio_quality: selectedAudioQuality })
                    });
                    if (!response.ok) throw new Error(`Erro ${response.status}`);
                    const blob = await response.blob();
                    const filename = sanitizeFilename(videoTitle) + ".mp3";
                    const blobUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(blobUrl);
                } catch (err) {
                    showError(`Erro ao baixar áudio: ${err.message}`);
                } finally {
                    if (btn) { btn.innerHTML = '<i class="fas fa-music"></i> Áudio (MP3)'; btn.disabled = false; }
                }
            };

            showPreview(thumbnailUrl, videoTitle, videoDownloadHandler, audioDownloadHandler);

        } catch (err) {
            console.error(err);
            showError(err.message || 'Falha ao obter informações do vídeo.');
        } finally {
            showLoading(false);
            downloadBtn.disabled = false;
            downloadBtn.innerHTML = '<i class="fas fa-cloud-download-alt"></i> Baixar agora';
        }
    }

    downloadBtn.addEventListener('click', iniciarProcessamento);
    videoUrlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') iniciarProcessamento(); });
    videoUrlInput.addEventListener('focus', () => { if (resultArea.innerHTML.includes('error-message')) resultArea.innerHTML = ''; });

    // Inicializar tema salvo
    loadSavedTheme();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/png" href="DOWNLOADER.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TikTok Downloader - Baixe vídeos sem marca d'água</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .container {
            max-width: 880px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffd6e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #e0e0e0;
            margin-top: 8px;
            font-weight: 400;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 0.75rem;
            color: #ccc;
            margin-top: 12px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1.5rem;
            padding: 1.8rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e1e2f;
            font-size: 0.9rem;
        }

        .input-group label i {
            margin-right: 8px;
            color: #ff3b6f;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 5px 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #ff3b6f;
            box-shadow: 0 0 0 3px rgba(255, 59, 111, 0.2);
            background: white;
        }

        .input-wrapper i {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 12px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .btn-download {
            background: linear-gradient(95deg, #ff3b6f, #fd1d1d);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 18px rgba(253, 29, 29, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(253, 29, 29, 0.4);
        }

        .btn-download:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        /* Botão flutuante no canto inferior direito */
        .btn-api-float {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #0f172a;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            backdrop-filter: blur(4px);
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-api-float:hover {
            background: #ff3b6f;
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(255, 59, 111, 0.4);
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            color: #1e1e2f;
            padding: 20px;
            font-weight: 500;
            background: rgba(255,255,255,0.9);
            border-radius: 60px;
            margin-top: 1rem;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid #ff3b6f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            margin-top: 1rem;
            animation: fadeInUp 0.4s ease;
            padding: 1.5rem;
            text-align: center;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-save {
            background: #0f172a;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-save:hover {
            background: #ff3b6f;
            transform: scale(1.02);
        }

        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 14px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            margin: 1rem 0 0;
            text-align: center;
        }

        .success-message {
            background: #e0f2fe;
            color: #0f172a;
            padding: 14px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            margin: 1rem 0 0;
            text-align: center;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #aaa;
        }

        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }
            .card {
                padding: 1.2rem;
            }
            .btn-api-float {
                padding: 10px 18px;
                font-size: 0.8rem;
                bottom: 16px;
                right: 16px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fab fa-tiktok"></i> TikTok Downloader</h1>
        <p>Baixe vídeos do TikTok sem marca d'água · Rápido e grátis</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label><i class="fab fa-tiktok"></i> URL do vídeo do TikTok</label>
            <div class="input-wrapper">
                <i class="fas fa-link"></i>
                <input type="text" id="videoUrl" placeholder="https://www.tiktok.com/@usuario/video/123456789" value="https://vm.tiktok.com/ZIJWNwKxu">
            </div>
        </div>

        <button class="btn-download" id="downloadBtn"><i class="fas fa-cloud-download-alt"></i> Baixar vídeo agora</button>
    </div>

    <div id="resultArea"></div>

    <footer>
        <i class="fas fa-shield-alt"></i> O vídeo é baixado diretamente da CDN do TikTok. Respeite os direitos autorais.
    </footer>
</div>

<!-- Botão flutuante no canto inferior direito -->
<button class="btn-api-float" id="apiDocsBtn">
    <i class="fas fa-book-open"></i> Documentação da API
</button>

<script>
    // ============================================================
    // CONFIGURAÇÃO DA SUA PRÓPRIA API
    // ============================================================
    const API_BASE_URL = "https://api-tiktok-pc0800.onrender.com";
    const API_KEY = "7x9K!mQ2@zLp#wR4";   // Sua chave definida no Render

    // Link para a documentação interativa da sua API
    const API_DOCS_URL = API_BASE_URL + "/docs";

    // DOM elements
    const videoUrlInput = document.getElementById('videoUrl');
    const downloadBtn = document.getElementById('downloadBtn');
    const resultArea = document.getElementById('resultArea');
    const apiDocsBtn = document.getElementById('apiDocsBtn');

    // Evento para abrir a documentação da sua API
    if (apiDocsBtn) {
        apiDocsBtn.addEventListener('click', () => {
            window.open(API_DOCS_URL, '_blank');
        });
    }

    // Mostrar loading
    function showLoading(show, message = "Processando vídeo...") {
        if (show) {
            resultArea.innerHTML = `<div class="loading"><div class="spinner"></div><span>${message}</span></div>`;
        } else {
            if (resultArea.firstChild && resultArea.firstChild.classList && resultArea.firstChild.classList.contains('loading')) {
                resultArea.innerHTML = '';
            }
        }
    }

    function showError(message) {
        resultArea.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
    }

    function showSuccess(title, downloadCallback) {
        resultArea.innerHTML = `
            <div class="result-card" id="resultCard">
                <i class="fab fa-tiktok" style="font-size: 2.5rem; color: #ff3b6f;"></i>
                <h3 style="margin-top: 8px;">Vídeo pronto para download</h3>
                <p>${escapeHtml(title) || "Seu vídeo foi processado com sucesso!"}</p>
                <button class="btn-save" id="finalDownloadBtn"><i class="fas fa-arrow-down"></i> Baixar vídeo</button>
            </div>
        `;
        const finalBtn = document.getElementById('finalDownloadBtn');
        if (finalBtn && downloadCallback) {
            finalBtn.addEventListener('click', downloadCallback);
        }
        document.getElementById('resultCard')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Função para extrair nome do arquivo do header Content-Disposition ou gerar um nome padrão
    function extractFilenameFromHeaders(contentDisposition, fallbackTitle = "tiktok_video") {
        if (contentDisposition && contentDisposition.includes('filename=')) {
            let match = contentDisposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
            if (match && match[1]) {
                let filename = match[1].replace(/['"]/g, '');
                return filename;
            }
        }
        // Gera nome com timestamp
        const safeTitle = fallbackTitle.replace(/[\\/*?:"<>|]/g, '').trim() || "tiktok_video";
        return `${safeTitle}.mp4`;
    }

    // Download via blob com nome correto
    async function downloadBlob(blob, filename) {
        const blobUrl = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = blobUrl;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(blobUrl);
    }

    // Função principal: chamar sua API e baixar o vídeo
    async function fetchTikTokVideo() {
        const videoUrl = videoUrlInput.value.trim();

        if (!videoUrl) {
            showError('Por favor, insira a URL do vídeo do TikTok.');
            return;
        }

        const tiktokRegex = /^(https?:\/\/)?(www\.|vm\.)?tiktok\.com\/(@[\w.]+|t\/[\w]+|embed|v\/\d+)/i;
        if (!tiktokRegex.test(videoUrl) && !videoUrl.includes('tiktok.com')) {
            showError('URL inválida. Cole um link válido do TikTok (ex: https://www.tiktok.com/@user/video/123)');
            return;
        }

        showLoading(true);
        downloadBtn.disabled = true;
        downloadBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processando...';

        try {
            const endpoint = `${API_BASE_URL}/download/video`;
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': API_KEY
                },
                body: JSON.stringify({ url: videoUrl })
            });

            if (!response.ok) {
                let errorText = `Erro ${response.status}`;
                if (response.status === 401) errorText = 'Chave de API inválida. Contate o administrador.';
                else if (response.status === 403) errorText = 'Acesso negado. Verifique sua chave de API.';
                else if (response.status === 400) errorText = 'URL inválida ou vídeo não encontrado.';
                else if (response.status === 429) errorText = 'Muitas requisições. Tente mais tarde.';
                else if (response.status >= 500) errorText = 'Erro interno no servidor. Tente novamente.';
                throw new Error(errorText);
            }

            // Sucesso: obter o blob do vídeo
            const blob = await response.blob();
            const contentDisposition = response.headers.get('Content-Disposition');
            // Tenta extrair título da URL original (fallback)
            let titleFromUrl = "TikTok_Video";
            try {
                const urlObj = new URL(videoUrl);
                const pathParts = urlObj.pathname.split('/');
                const videoId = pathParts[pathParts.length - 1] || "video";
                titleFromUrl = `tiktok_${videoId}`;
            } catch(e) { /* ignora */ }
            const filename = extractFilenameFromHeaders(contentDisposition, titleFromUrl);

            // Exibir área de sucesso com botão de download
            showSuccess(`Vídeo pronto: ${filename}`, async () => {
                const finalBtn = document.getElementById('finalDownloadBtn');
                if (finalBtn) {
                    finalBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Baixando...';
                    finalBtn.disabled = true;
                }
                await downloadBlob(blob, filename);
                if (finalBtn) {
                    finalBtn.innerHTML = '<i class="fas fa-arrow-down"></i> Baixar vídeo';
                    finalBtn.disabled = false;
                }
            });

        } catch (error) {
            console.error(error);
            let userMsg = error.message || 'Falha ao processar o download. Verifique a URL.';
            if (userMsg.includes('Failed to fetch') || userMsg.includes('NetworkError')) {
                userMsg = 'Erro de rede. Verifique sua conexão com a internet.';
            }
            showError(userMsg);
        } finally {
            showLoading(false);
            downloadBtn.disabled = false;
            downloadBtn.innerHTML = '<i class="fas fa-cloud-download-alt"></i> Baixar vídeo agora';
        }
    }

    downloadBtn.addEventListener('click', fetchTikTokVideo);

    // Permitir tecla Enter no campo de URL
    videoUrlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            fetchTikTokVideo();
        }
    });

    // Limpar mensagens de erro ao focar no campo
    videoUrlInput.addEventListener('focus', () => {
        if (resultArea.innerHTML.includes('error-message')) resultArea.innerHTML = '';
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/png" href="DOWNLOADER.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TikTok Downloader - Baixe vídeos sem marca d'água</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .container {
            max-width: 880px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffd6e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #e0e0e0;
            margin-top: 8px;
            font-weight: 400;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 0.75rem;
            color: #ccc;
            margin-top: 12px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1.5rem;
            padding: 1.8rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e1e2f;
            font-size: 0.9rem;
        }

        .input-group label i {
            margin-right: 8px;
            color: #ff3b6f;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 5px 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #ff3b6f;
            box-shadow: 0 0 0 3px rgba(255, 59, 111, 0.2);
            background: white;
        }

        .input-wrapper i {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 12px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .btn-download {
            background: linear-gradient(95deg, #ff3b6f, #fd1d1d);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 18px rgba(253, 29, 29, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(253, 29, 29, 0.4);
        }

        .btn-download:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        /* Botão flutuante no canto inferior direito */
        .btn-api-float {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #0f172a;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            backdrop-filter: blur(4px);
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-api-float:hover {
            background: #ff3b6f;
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(255, 59, 111, 0.4);
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            color: #1e1e2f;
            padding: 20px;
            font-weight: 500;
            background: rgba(255,255,255,0.9);
            border-radius: 60px;
            margin-top: 1rem;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid #ff3b6f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            margin-top: 1rem;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 1.5rem;
            border-bottom: 1px solid #edf2f7;
        }

        .thumbnail {
            flex-shrink: 0;
            width: 140px;
            height: 200px;
            border-radius: 18px;
            overflow: hidden;
            background: #f1f5f9;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            flex: 1;
        }

        .info h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            word-break: break-word;
        }

        .info h3 i {
            color: #ff3b6f;
        }

        .info p {
            color: #475569;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        .btn-save {
            background: #0f172a;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save:hover {
            background: #ff3b6f;
            transform: scale(1.02);
        }

        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 14px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            margin: 1rem 0 0;
            text-align: center;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #aaa;
        }

        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }
            .card {
                padding: 1.2rem;
            }
            .video-preview {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .info h3 {
                justify-content: center;
            }
            .thumbnail {
                width: 120px;
                height: 170px;
            }
            .btn-api-float {
                padding: 10px 18px;
                font-size: 0.8rem;
                bottom: 16px;
                right: 16px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fab fa-tiktok"></i> TikTok Downloader</h1>
        <p>Baixe vídeos do TikTok sem marca d'água · Rápido e grátis</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label><i class="fab fa-tiktok"></i> URL do vídeo do TikTok</label>
            <div class="input-wrapper">
                <i class="fas fa-link"></i>
                <input type="text" id="videoUrl" placeholder="https://www.tiktok.com/@usuario/video/123456789" value="https://vm.tiktok.com/ZIJWNwKxu">
            </div>
        </div>

        <button class="btn-download" id="downloadBtn"><i class="fas fa-cloud-download-alt"></i> Baixar vídeo agora</button>
    </div>

    <div id="resultArea"></div>

    <footer>
        <i class="fas fa-shield-alt"></i> O vídeo é baixado diretamente da CDN do TikTok. Respeite os direitos autorais.
    </footer>
</div>

<!-- Botão flutuante no canto inferior direito -->
<button class="btn-api-float" id="apiGuideBtn">
    <i class="fas fa-question-circle"></i> Onde encontrar a minha API?
</button>

<script>
    // ============================================================
    // CHAVE DA API INTEGRADA DIRETAMENTE
    // ============================================================
    const API_KEY = "f3ed166634msh47cae4b0abab658p13a2e7jsnfd7ddf30ff8c";
    
    // Link para guia da API (RapidAPI)
    const API_GUIDE_URL = "https://rapidapi.com/elisbushaj2/api/tiktok-video-downloader-api/playground/apiendpoint_190e8489-6a0c-4853-a733-56c29e438540";
    
    // DOM elements
    const videoUrlInput = document.getElementById('videoUrl');
    const downloadBtn = document.getElementById('downloadBtn');
    const resultArea = document.getElementById('resultArea');
    const apiGuideBtn = document.getElementById('apiGuideBtn');

    // Evento para abrir o link em nova aba
    if (apiGuideBtn) {
        apiGuideBtn.addEventListener('click', () => {
            window.open(API_GUIDE_URL, '_blank');
        });
    }

    // Mostrar loading
    function showLoading(show, message = "Obtendo informações do vídeo...") {
        if (show) {
            resultArea.innerHTML = `<div class="loading"><div class="spinner"></div><span>${message}</span></div>`;
        } else if (!show && resultArea.innerHTML.includes('loading')) {
            if(resultArea.firstChild && resultArea.firstChild.classList && resultArea.firstChild.classList.contains('loading')) {
                resultArea.innerHTML = '';
            }
        }
    }

    function showError(message) {
        resultArea.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
    }

    // Função para limpar tags HTML e emojis problemáticos (manter texto legível)
    function cleanTitle(title) {
        if (!title) return "TikTok Video";
        // Remove tags HTML
        let clean = title.replace(/<[^>]*>/g, '');
        // Remove caracteres de controle e emojis? Vamos deixar a maioria, mas substituir alguns problemáticos para nome de arquivo
        // Mas para exibição, queremos o texto original sem tags
        return clean.trim() || "TikTok Video";
    }

    // Função para sanitizar nome de arquivo (remove caracteres inválidos para Windows/Linux)
    function sanitizeFilename(name) {
        if (!name) return "tiktok_video";
        // Remove tags HTML
        let clean = name.replace(/<[^>]*>/g, '');
        // Remove caracteres proibidos em nomes de arquivo: \ / : * ? " < > | e também control chars
        clean = clean.replace(/[\\/*?:"<>|]/g, '');
        // Remove emojis? Vamos manter caracteres alfanuméricos, espaços, hífens e underscores
        clean = clean.replace(/[^\w\s\u00C0-\u024F\u1E00-\u1EFF\-\.]/g, '');
        // Remove espaços extras
        clean = clean.trim().replace(/\s+/g, ' ');
        // Limita tamanho
        if (clean.length > 80) clean = clean.substring(0, 80);
        return clean || "tiktok_video";
    }

    // Download via blob com nome correto
    async function downloadVideoAsFile(videoUrl, rawTitle) {
        try {
            const fileNameBase = sanitizeFilename(rawTitle);
            const response = await fetch(videoUrl);
            if (!response.ok) throw new Error('Falha ao baixar stream');
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            const link = document.createElement('a');
            let filename = `${fileNameBase}.mp4`;
            // Garantir que não esteja vazio
            if (!filename || filename === '.mp4') filename = `tiktok_${Date.now()}.mp4`;
            link.href = blobUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(blobUrl);
            return true;
        } catch (err) {
            console.warn('Blob download falhou', err);
            return false;
        }
    }

    // Função principal: chamar API e processar
    async function fetchTikTokVideo() {
        const videoUrl = videoUrlInput.value.trim();

        if (!videoUrl) {
            showError('Por favor, insira a URL do vídeo do TikTok.');
            return;
        }

        const tiktokRegex = /^(https?:\/\/)?(www\.|vm\.)?tiktok\.com\/(@[\w.]+|t\/[\w]+|embed|v\/\d+)/i;
        if (!tiktokRegex.test(videoUrl) && !videoUrl.includes('tiktok.com')) {
            showError('URL inválida. Cole um link válido do TikTok (ex: https://www.tiktok.com/@user/video/123)');
            return;
        }

        showLoading(true);
        downloadBtn.disabled = true;
        downloadBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processando...';

        try {
            const apiUrl = `https://tiktok-video-downloader-api.p.rapidapi.com/media?videoUrl=${encodeURIComponent(videoUrl)}`;
            
            const response = await fetch(apiUrl, {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': API_KEY,
                    'x-rapidapi-host': 'tiktok-video-downloader-api.p.rapidapi.com'
                }
            });

            if (!response.ok) {
                let errorText = `Erro ${response.status}`;
                if (response.status === 403) errorText = 'Chave de API inválida ou expirada. Contate o suporte.';
                else if (response.status === 429) errorText = 'Limite de requisições excedido. Tente mais tarde.';
                else if (response.status === 404) errorText = 'Vídeo não encontrado ou URL inválida.';
                throw new Error(errorText);
            }

            const data = await response.json();
            console.log("Resposta da API:", data); // Para debug

            let downloadUrl = null;
            let videoTitle = null;
            let thumbnailUrl = null;

            // Estruturas conhecidas da API (ajustado para capturar título e thumbnail real)
            // Possibilidade 1: dados diretos
            if (data.downloadUrl) {
                downloadUrl = data.downloadUrl;
                videoTitle = data.title || data.desc || null;
                thumbnailUrl = data.thumbnail || data.thumb || null;
            } 
            // Possibilidade 2: dentro de data
            else if (data.data && data.data.downloadUrl) {
                downloadUrl = data.data.downloadUrl;
                videoTitle = data.data.title || data.data.desc || null;
                thumbnailUrl = data.data.thumbnail || data.data.thumb || null;
            }
            // Possibilidade 3: dentro de video
            else if (data.video && data.video.downloadUrl) {
                downloadUrl = data.video.downloadUrl;
                videoTitle = data.video.title || data.video.desc || null;
                thumbnailUrl = data.video.thumb || data.video.thumbnail || null;
            }
            // Possibilidade 4: resultado aninhado
            else if (data.result && data.result.downloadUrl) {
                downloadUrl = data.result.downloadUrl;
                videoTitle = data.result.title || data.result.desc || null;
                thumbnailUrl = data.result.thumbnail || data.result.thumb || null;
            }
            else {
                // Tenta encontrar qualquer URL de download nos campos comuns
                const possibleUrl = data.url || data.videoUrl || data.link;
                if (possibleUrl) downloadUrl = possibleUrl;
                videoTitle = data.title || data.desc || data.caption || null;
                thumbnailUrl = data.thumb || data.thumbnail || null;
            }

            // Se ainda não temos título, tenta extrair da resposta de forma mais profunda
            if (!videoTitle) {
                if (data.desc) videoTitle = data.desc;
                else if (data.caption) videoTitle = data.caption;
                else if (data.title) videoTitle = data.title;
                else if (data.data && data.data.desc) videoTitle = data.data.desc;
                else if (data.video && data.video.desc) videoTitle = data.video.desc;
            }

            // Limpeza do título (remover tags HTML)
            let cleanDisplayTitle = "Vídeo TikTok";
            if (videoTitle) {
                cleanDisplayTitle = cleanTitle(videoTitle);
                // Se após limpeza ficar vazio, usa padrão
                if (!cleanDisplayTitle) cleanDisplayTitle = "Vídeo TikTok";
            }

            // Thumbnail: se não veio, usa placeholder
            if (!thumbnailUrl) {
                thumbnailUrl = 'https://placehold.co/400x600?text=Sem+Preview';
            }

            if (!downloadUrl) {
                throw new Error('A API não retornou o link de download. Verifique se o vídeo é público.');
            }

            // Montar card de resultado com thumbnail real e título real
            resultArea.innerHTML = `
                <div class="result-card" id="resultCard">
                    <div class="video-preview">
                        <div class="thumbnail">
                            <img src="${thumbnailUrl}" alt="thumbnail" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/400x600?text=Sem+Preview'">
                        </div>
                        <div class="info">
                            <h3><i class="fab fa-tiktok"></i> ${escapeHtml(cleanDisplayTitle)}</h3>
                            <p><i class="fas fa-download"></i> Clique no botão abaixo para salvar o vídeo em alta qualidade (sem marca d'água)</p>
                            <button class="btn-save" id="finalDownloadBtn"><i class="fas fa-arrow-down"></i> Baixar vídeo</button>
                        </div>
                    </div>
                </div>
            `;

            const finalDownloadUrl = downloadUrl;
            const finalRawTitle = cleanDisplayTitle; // Título já limpo para exibição e nome de arquivo

            const finalBtn = document.getElementById('finalDownloadBtn');
            if (finalBtn) {
                finalBtn.addEventListener('click', async () => {
                    finalBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Preparando...';
                    finalBtn.disabled = true;
                    const success = await downloadVideoAsFile(finalDownloadUrl, finalRawTitle);
                    if (!success) {
                        // Fallback: abrir em nova aba
                        window.open(finalDownloadUrl, '_blank');
                        const msgDiv = document.createElement('div');
                        msgDiv.className = 'error-message';
                        msgDiv.style.marginTop = '12px';
                        msgDiv.innerHTML = '<i class="fas fa-info-circle"></i> Download direto não foi possível, abrimos o vídeo em nova aba. Clique com botão direito e "Salvar como".';
                        document.querySelector('.result-card').appendChild(msgDiv);
                    }
                    finalBtn.innerHTML = '<i class="fas fa-arrow-down"></i> Baixar vídeo';
                    finalBtn.disabled = false;
                });
            }

            document.getElementById('resultCard')?.scrollIntoView({ behavior: 'smooth', block: 'start' });

        } catch (error) {
            console.error(error);
            let userMsg = error.message || 'Falha ao processar o download. Verifique a URL.';
            if (userMsg.includes('Failed to fetch') || userMsg.includes('NetworkError')) {
                userMsg = 'Erro de rede. Verifique sua conexão com a internet.';
            }
            showError(userMsg);
        } finally {
            showLoading(false);
            downloadBtn.disabled = false;
            downloadBtn.innerHTML = '<i class="fas fa-cloud-download-alt"></i> Baixar vídeo agora';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c; // mantém emojis na exibição
        });
    }

    downloadBtn.addEventListener('click', fetchTikTokVideo);

    // Permitir tecla Enter no campo de URL
    videoUrlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            fetchTikTokVideo();
        }
    });

    // Limpar mensagens de erro ao focar no campo
    videoUrlInput.addEventListener('focus', () => {
        if (resultArea.innerHTML.includes('error-message')) resultArea.innerHTML = '';
    });
</script>
</body>
</html>

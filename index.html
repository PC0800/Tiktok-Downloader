        }

        .theme-panel.hidden {
            display: none;
        }

            height: 36px;

            border: 2px solid white;

        light: { bodyBg: "#e2e8f0", containerBg: "rgba(255, 255, 255, 0.9)", cardBg: "#ffffff", textPrimary: "#0f172a", textSecondary: "#334155", inputBg: "#f1f5f9", inputBorder: "#cbd5e1", inputText: "#0f172a", buttonBg: "linear-gradient(95deg, #ff3b6f, #fd1d1d)", buttonText: "white", borderLight: "#e2e8f0", resultBg: "#ffffff", resultText: "#0f172a", errorBg: "#fee2e2", errorText: "#b91c1c", loadingBg: "#ffffff", loadingText: "#0f172a" },
        blue: { bodyBg: "#1e3a8a", containerBg: "rgba(30, 58, 138, 0.85)", cardBg: "#1e40af", textPrimary: "#dbeafe", textSecondary: "#bfdbfe", inputBg: "#2563eb", inputBorder: "#3b82f6", inputText: "#ffffff", buttonBg: "linear-gradient(95deg, #f97316, #ea580c)", buttonText: "white", borderLight: "#3b82f6", resultBg: "#1e40af", resultText: "#dbeafe", errorBg: "#7f1a1a", errorText: "#fecaca", loadingBg: "#1e40af", loadingText: "#dbeafe" },
        green: { bodyBg: "#166534", containerBg: "rgba(21, 128, 61, 0.85)", cardBg: "#15803d", textPrimary: "#dcfce7", textSecondary: "#bbf7d0", inputBg: "#22c55e", inputBorder: "#4ade80", inputText: "#052e16", buttonBg: "linear-gradient(95deg, #f97316, #ea580c)", buttonText: "white", borderLight: "#4ade80", resultBg: "#15803d", resultText: "#dcfce7", errorBg: "#7f1a1a", errorText: "#fecaca", loadingBg: "#15803d", loadingText: "#dcfce7" },
        purple: { bodyBg: "#5b21b6", containerBg: "rgba(91, 33, 182, 0.85)", cardBg: "#6d28d9", textPrimary: "#ede9fe", textSecondary: "#ddd6fe", inputBg: "#8b5cf6", inputBorder: "#a78bfa", inputText: "#ffffff", buttonBg: "linear-gradient(95deg, #ec4899, #db2777)", buttonText: "white", borderLight: "#a78bfa", resultBg: "#6d28d9", resultText: "#ede9fe", errorBg: "#7f1a1a", errorText: "#fecaca", loadingBg: "#6d28d9", loadingText: "#ede9fe" },
        orange: { bodyBg: "#c2410c", containerBg: "rgba(194, 65, 12, 0.85)", cardBg: "#ea580c", textPrimary: "#ffedd5", textSecondary: "#fed7aa", inputBg: "#f97316", inputBorder: "#fb923c", inputText: "#431407", buttonBg: "linear-gradient(95deg, #3b82f6, #2563eb)", buttonText: "white", borderLight: "#fb923c", resultBg: "#ea580c", resultText: "#ffedd5", errorBg: "#7f1a1a", errorText: "#fecaca", loadingBg: "#ea580c", loadingText: "#ffedd5" },
        pink: { bodyBg: "#be185d", containerBg: "rgba(190, 24, 93, 0.85)", cardBg: "#db2777", textPrimary: "#fce7f3", textSecondary: "#fbcfe8", inputBg: "#ec4899", inputBorder: "#f472b6", inputText: "#ffffff", buttonBg: "linear-gradient(95deg, #06b6d4, #0891b2)", buttonText: "white", borderLight: "#f472b6", resultBg: "#db2777", resultText: "#fce7f3", errorBg: "#7f1a1a", errorText: "#fecaca", loadingBg: "#db2777", loadingText: "#fce7f3" },
        teal: { bodyBg: "#0f766e", containerBg: "rgba(15, 118, 110, 0.85)", cardBg: "#0d9488", textPrimary: "#ccfbf1", textSecondary: "#a7f3d0", inputBg: "#14b8a6", inputBorder: "#2dd4bf", inputText: "#042f2e", buttonBg: "linear-gradient(95deg, #f43f5e, #e11d48)", buttonText: "white", borderLight: "#2dd4bf", resultBg: "#0d9488", resultText: "#ccfbf1", errorBg: "#7f1a1a", errorText: "#fecaca", loadingBg: "#0d9488", loadingText: "#ccfbf1" },
        red: { bodyBg: "#b91c1c", containerBg: "rgba(185, 28, 28, 0.85)", cardBg: "#dc2626", textPrimary: "#fee2e2", textSecondary: "#fecaca", inputBg: "#ef4444", inputBorder: "#f87171", inputText: "#ffffff", buttonBg: "linear-gradient(95deg, #3b82f6, #2563eb)", buttonText: "white", borderLight: "#f87171", resultBg: "#dc2626", resultText: "#fee2e2", errorBg: "#7f1a1a", errorText: "#fecaca", loadingBg: "#dc2626", loadingText: "#fee2e2" },
        indigo: { bodyBg: "#4338ca", containerBg: "rgba(67, 56, 202, 0.85)", cardBg: "#4f46e5", textPrimary: "#e0e7ff", textSecondary: "#c7d2fe", inputBg: "#6366f1", inputBorder: "#818cf8", inputText: "#ffffff", buttonBg: "linear-gradient(95deg, #f59e0b, #d97706)", buttonText: "white", borderLight: "#818cf8", resultBg: "#4f46e5", resultText: "#e0e7ff", errorBg: "#7f1a1a", errorText: "#fecaca", loadingBg: "#4f46e5", loadingText: "#e0e7ff" }
    };

    function applyTheme(themeName) {
        const theme = themes[themeName];
        if (!theme) return;
        document.body.style.backgroundColor = theme.bodyBg;
        document.body.style.color = theme.textPrimary;
        appContainer.style.background = theme.containerBg;
        appContainer.style.backdropFilter = "blur(12px)";
        appContainer.style.border = "1px solid rgba(255,255,255,0.2)";
        mainCard.style.backgroundColor = theme.cardBg;
        mainCard.style.color = theme.textPrimary;
        mainCard.style.boxShadow = "0 15px 35px rgba(0,0,0,0.2)";
        const wrappers = document.querySelectorAll('.input-wrapper');
        wrappers.forEach(w => {
            w.style.backgroundColor = theme.inputBg;
            w.style.borderColor = theme.inputBorder;
            w.style.color = theme.inputText;
        });
        const selects = document.querySelectorAll('select');
        selects.forEach(s => {
            s.style.backgroundColor = theme.inputBg;
            s.style.color = theme.inputText;
        });
        const textInputs = document.querySelectorAll('input');
        textInputs.forEach(i => {
            i.style.color = theme.inputText;
        });
        const btn = document.querySelector('.btn-download');
        if (btn) {
            btn.style.background = theme.buttonBg;
            btn.style.color = theme.buttonText;
        }
        const apiBtn = document.querySelector('.btn-api-float');
        if (apiBtn) {
            apiBtn.style.backgroundColor = "rgba(0,0,0,0.7)";
            apiBtn.style.color = "white";
        }
        const themeBtn = document.querySelector('.theme-toggle');
        if (themeBtn) {
            themeBtn.style.backgroundColor = "rgba(0,0,0,0.7)";
            themeBtn.style.color = "white";
        }
        document.documentElement.style.setProperty('--result-bg', theme.resultBg);
        document.documentElement.style.setProperty('--result-text', theme.resultText);
        document.documentElement.style.setProperty('--error-bg', theme.errorBg);
        document.documentElement.style.setProperty('--error-text', theme.errorText);
        document.documentElement.style.setProperty('--loading-bg', theme.loadingBg);
        document.documentElement.style.setProperty('--loading-text', theme.loadingText);
        localStorage.setItem('selectedTheme', themeName);
        document.querySelectorAll('.theme-option').forEach(opt => {
            if (opt.getAttribute('data-theme') === themeName) {
                opt.classList.add('selected');
            } else {
                opt.classList.remove('selected');
            }
        });
    }

    function loadSavedTheme() {
        const saved = localStorage.getItem('selectedTheme');
        if (saved && themes[saved]) {
            applyTheme(saved);
        } else {
            applyTheme('dark');
        }
    }

    themeToggleBtn.addEventListener('click', () => {
        themePanel.classList.toggle('hidden');
    });
    document.querySelectorAll('.theme-option').forEach(opt => {
        opt.addEventListener('click', (e) => {
            const themeName = opt.getAttribute('data-theme');
            applyTheme(themeName);
            themePanel.classList.add('hidden');
        });
    });

    // ========== FUNCIONALIDADES DA API ==========
    if (apiDocsBtn) {
        apiDocsBtn.addEventListener('click', () => window.open(API_DOCS_URL, '_blank'));
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showLoading(show, message = null) {
        const t = translations[currentLanguage];
        const loadingMsg = message || (t ? t.loadingMessage : "Buscando informações...");
        if (show) {
            resultArea.innerHTML = `<div class="loading" style="background: var(--loading-bg, #fff); color: var(--loading-text, #000);"><div class="spinner"></div><span>${loadingMsg}</span></div>`;
        } else {
            if (resultArea.firstChild && resultArea.firstChild.classList && resultArea.firstChild.classList.contains('loading')) {
                resultArea.innerHTML = '';
            }
        }
    }

    function showError(message) {
        resultArea.innerHTML = `<div class="error-message" style="background: var(--error-bg, #fee2e2); color: var(--error-text, #b91c1c);"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
    }

    function showPreview(thumbnailUrl, videoTitle, videoDownloadHandler, audioDownloadHandler) {
        const t = translations[currentLanguage];
        const chooseFormatText = t ? t.chooseFormat : "Escolha o formato:";
        const videoBtnText = t ? t.videoBtn : "Vídeo (MP4)";
        const audioBtnText = t ? t.audioBtn : "Áudio (MP3)";
        resultArea.innerHTML = `
            <div class="result-card" id="resultCard" style="background: var(--result-bg, white); color: var(--result-text, black);">
                <div class="video-preview">
                    <div class="thumbnail">
                        <img src="${thumbnailUrl}" alt="thumbnail" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/400x600?text=Sem+Preview'">
                    </div>
                    <div class="info">
                        <h3><i class="fab fa-tiktok"></i> ${escapeHtml(videoTitle)}</h3>
                        <p><i class="fas fa-download"></i> ${chooseFormatText}</p>
                        <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
                            <button class="btn-save" id="finalDownloadBtnVideo" style="background: #0f172a; color: white;"><i class="fas fa-video"></i> ${videoBtnText}</button>
                            <button class="btn-save" id="finalDownloadBtnAudio" style="background: #0f172a; color: white;"><i class="fas fa-music"></i> ${audioBtnText}</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        const videoBtn = document.getElementById('finalDownloadBtnVideo');
        const audioBtn = document.getElementById('finalDownloadBtnAudio');
        if (videoBtn && videoDownloadHandler) videoBtn.addEventListener('click', videoDownloadHandler);
        if (audioBtn && audioDownloadHandler) audioBtn.addEventListener('click', audioDownloadHandler);
        document.getElementById('resultCard')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function sanitizeFilename(name) {
        if (!name) return "tiktok_video";
        let clean = name.replace(/<[^>]*>/g, '');
        clean = clean.replace(/[\\/*?:"<>|]/g, '');
        clean = clean.replace(/[^\w\s\u00C0-\u024F\u1E00-\u1EFF\-\.]/g, '');
        clean = clean.trim().replace(/\s+/g, ' ');
        if (clean.length > 80) clean = clean.substring(0, 80);
        return clean || "tiktok_video";
    }

    async function iniciarProcessamento() {
        let videoUrl = videoUrlInput.value.trim();
        if (videoUrl.includes('?')) videoUrl = videoUrl.split('?')[0];
        if (!videoUrl.startsWith('http')) videoUrl = 'https://' + videoUrl;

        const t = translations[currentLanguage];
        // Verificação de links encurtados com mensagem traduzida
        if (videoUrl.includes('vt.tiktok.com') || videoUrl.includes('vm.tiktok.com')) {
            showError(t ? t.errorShortLink : '❌ Links encurtados não são suportados.');
            return;
        }

        const tiktokRegex = /^(https?:\/\/)?((www|vm|vt)\.)?tiktok\.com\/(@[\w.]+|t\/[\w]+|embed|v\/\d+|\w+)/i;
        if (!tiktokRegex.test(videoUrl)) {
            showError(t ? t.errorInvalidUrl : 'URL inválida.');
            return;
        }

        const selectedVideoQuality = videoQualitySelect.value;
        const selectedAudioQuality = audioQualitySelect.value;

        showLoading(true);
        downloadBtn.disabled = true;
        downloadBtn.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${t ? t.processing : 'Processando...'}`;

        try {
            const infoEndpoint = `${API_BASE_URL}/info?url=${encodeURIComponent(videoUrl)}`;
            const infoResponse = await fetch(infoEndpoint, {
                method: 'GET',
                headers: { 'X-API-Key': API_KEY }
            });
            if (!infoResponse.ok) throw new Error(`Erro ${infoResponse.status}`);
            const infoData = await infoResponse.json();
            const videoTitle = infoData.title;
            const thumbnailUrl = infoData.thumbnail || 'https://placehold.co/400x600?text=Sem+Preview';

            const videoDownloadHandler = async () => {
                const btn = document.getElementById('finalDownloadBtnVideo');
                if (btn) {
                    btn.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${t ? t.downloadingVideo : 'Baixando...'}`;
                    btn.disabled = true;
                }
                try {
                    const response = await fetch(`${API_BASE_URL}/download/video`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                        body: JSON.stringify({ url: videoUrl, video_quality: selectedVideoQuality })
                    });
                    if (!response.ok) throw new Error(`Erro ${response.status}`);
                    const blob = await response.blob();
                    const filename = sanitizeFilename(videoTitle) + ".mp4";
                    const blobUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(blobUrl);
                } catch (err) {
                    showError(`${t ? t.errorDownloadVideo : 'Erro ao baixar vídeo: '}${err.message}`);
                } finally {
                    if (btn) {
                        btn.innerHTML = `<i class="fas fa-video"></i> ${t ? t.videoBtn : 'Vídeo (MP4)'}`;
                        btn.disabled = false;
                    }
                }
            };

            const audioDownloadHandler = async () => {
                const btn = document.getElementById('finalDownloadBtnAudio');
                if (btn) {
                    btn.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${t ? t.processingAudio : 'Processando áudio...'}`;
                    btn.disabled = true;
                }
                try {
                    const response = await fetch(`${API_BASE_URL}/download/audio`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                        body: JSON.stringify({ url: videoUrl, audio_quality: selectedAudioQuality })
                    });
                    if (!response.ok) throw new Error(`Erro ${response.status}`);
                    const blob = await response.blob();
                    const filename = sanitizeFilename(videoTitle) + ".mp3";
                    const blobUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(blobUrl);
                } catch (err) {
                    showError(`${t ? t.errorDownloadAudio : 'Erro ao baixar áudio: '}${err.message}`);
                } finally {
                    if (btn) {
                        btn.innerHTML = `<i class="fas fa-music"></i> ${t ? t.audioBtn : 'Áudio (MP3)'}`;
                        btn.disabled = false;
                    }
                }
            };

            showPreview(thumbnailUrl, videoTitle, videoDownloadHandler, audioDownloadHandler);

        } catch (err) {
            console.error(err);
            showError(err.message || (t ? t.errorFetchInfo : 'Falha ao obter informações do vídeo.'));
        } finally {
            showLoading(false);
            downloadBtn.disabled = false;
            downloadBtn.innerHTML = `<i class="fas fa-cloud-download-alt"></i> ${t ? t.btnDownloadText : 'Baixar agora'}`;
        }
    }

    downloadBtn.addEventListener('click', iniciarProcessamento);
    videoUrlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') iniciarProcessamento(); });
    videoUrlInput.addEventListener('focus', () => { if (resultArea.innerHTML.includes('error-message')) resultArea.innerHTML = ''; });

    loadSavedTheme();
</script>
</body>
</html>
